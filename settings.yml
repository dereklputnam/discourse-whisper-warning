whisper_only:
  default: false
  type: bool
  label: "Whisper only"
  description: "Only show the warning button when composing a whisper; hide it for public replies."

restrict_to_group:
  default: ""
  type: string
  label: "Restrict to group"
  description: "Enter a group name to limit the warning to members of that group only. Leave blank to show for all users who can whisper."
