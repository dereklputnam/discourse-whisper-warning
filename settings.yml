whisper_only:
  default: false
  type: bool
  label: "Whisper only"
  description: "Only show the warning button when composing a whisper; hide it for public replies."

restrict_to_groups:
  default: ""
  type: list
  label: "Restrict to groups"
  description: "Enter one or more group names (comma-separated) to limit the warning to members of those groups. Leave blank to show for all users who can whisper."
